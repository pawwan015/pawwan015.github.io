<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B Pawan Kumar | Electrical Engineer</title>

  <style>
    :root {
      --bg: #08111f;
      --surface: #111c2e;
      --text: #f8fafc;
      --muted: #a7b5c8;
      --line: rgba(148, 163, 184, 0.22);
      --primary: #38bdf8;
      --accent: #22c55e;
      --shadow: 0 20px 60px rgba(2, 8, 23, 0.35);
    }

    [data-theme="light"] {
      --bg: #eef5fb;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #526174;
      --line: rgba(15, 23, 42, 0.14);
      --primary: #0369a1;
      --accent: #15803d;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.16), transparent 28rem),
        radial-gradient(circle at 85% 15%, rgba(34, 197, 94, 0.12), transparent 26rem),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .container {
      width: min(1120px, 92%);
      margin: auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--bg) 84%, transparent);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 70px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #00111f;
      font-weight: 900;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links a,
    .icon-btn,
    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      transition: 0.2s ease;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .nav-links a:hover,
    .icon-btn:hover,
    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 54px;
      cursor: pointer;
    }

    .mobile-menu-btn {
      display: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 34px;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 54px 0 44px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      margin: 0 0 12px;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 8px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .hero h1 {
      font-size: clamp(42px, 8vw, 84px);
      line-height: 0.95;
      margin: 0 0 18px;
    }

    .hero h1 span {
      color: var(--primary);
    }

    .hero-text {
      max-width: 680px;
      color: var(--muted);
      font-size: 18px;
      margin: 0 0 26px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #00111f;
    }

    .hero-panel,
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero-panel {
      padding: 22px;
    }

    .status-card {
      display: grid;
      gap: 16px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .status-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .status-label {
      color: var(--muted);
      font-size: 13px;
    }

    .status-value {
      text-align: right;
      font-weight: 800;
    }

    .section {
      padding: 54px 0;
      border-top: 1px solid var(--line);
    }

    .section-heading {
      margin-bottom: 24px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 30px;
    }

    .section-heading p {
      margin: 4px 0 0;
      color: var(--muted);
      max-width: 560px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      padding: 18px;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .card p {
      color: var(--muted);
      margin: 0 0 8px;
    }

    .meta {
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    ul {
      margin: 12px 0 0;
      padding-left: 19px;
      color: var(--muted);
    }

    li {
      margin: 7px 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search {
      flex: 1 1 240px;
      min-height: 44px;
      padding: 0 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      min-height: 44px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #00111f;
    }

    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border-radius: 8px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 14px;
    }

    .skill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    .timeline {
      display: grid;
      gap: 16px;
    }

    .timeline-card {
      position: relative;
      padding-left: 24px;
    }

    .timeline-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 24px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .result {
      display: inline-flex;
      margin-top: 6px;
      color: var(--accent);
      font-weight: 800;
    }

    .footer {
      padding: 28px 0 42px;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transition: 0.22s ease;
      z-index: 40;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 880px) {
      .hero,
      .grid.two {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
      }

      .mobile-menu-btn {
        display: inline-grid;
      }

      .nav-links {
        position: absolute;
        top: 70px;
        left: 4%;
        right: 4%;
        display: none;
        flex-direction: column;
        align-items: stretch;
        padding: 12px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .section {
        padding: 38px 0;
      }

      .hero-actions .btn {
        width: 100%;
      }

      .status-row {
        display: block;
      }

      .status-value {
        text-align: left;
        margin-top: 3px;
      }
    }
  </style>
</head>

<body>
</body>
</html>
